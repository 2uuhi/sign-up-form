<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>odin-project: sign-up form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- logo -->
  <img class="logo" src="logo.jpg" alt="Company Logo">
  <!-- author's note -->
  <p class="author-note">* Made for practice purposes only.</p>

  <div class="side-image"></div>

  <div class="container sign-up-container">
    <h1>/ Sign Up</h1>
    <form action="#" method="post">
      <label for="full-name">Full Name</label>
      <input type="text" id="full-name" name="full-name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" minlength="8" required>
      <span class="icon"></span>

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm-password" minlength="8" required>
      <span class="icon"></span>

      <p class="subtext">By signing up, you agree to our <strong>Terms</strong> and <strong>Privacy Policy</strong>.</p>

      <div class="container button-container">
        <button type="submit" id="submitButton">Sign Up</button>
        <p class="subtext">Already have an account? <a href="">Log In</a></p>
      </div>
    </form>
  </div> 
</body>

<script>
  // Password validation
  const passwordInput = document.getElementById("password");
  const confirmPasswordInput = document.getElementById("confirm-password");

  confirmPasswordInput.addEventListener("input", () => {
    if (confirmPasswordInput.value === passwordInput.value) {
      confirmPasswordInput.classList.remove("password-mismatch");
      confirmPasswordInput.classList.add("password-match");
    } else {
      confirmPasswordInput.classList.remove("password-match");
      confirmPasswordInput.classList.add("password-mismatch");
    }
  });
  // Bug01: Does not work if user changes the password after confirming it.

  // Button submission
  const submitButton = document.getElementById("submitButton");
  submitButton.addEventListener("click", (event) => {
    event.preventDefault(); // Prevent form submission for demonstration

    // Check if passwords match before allowing submission for measures against Bug01 for now
    if (confirmPasswordInput.value === passwordInput.value) {
      confirmPasswordInput.classList.remove("password-mismatch");
      confirmPasswordInput.classList.add("password-match");
    } else {
      confirmPasswordInput.classList.remove("password-match");
      confirmPasswordInput.classList.add("password-mismatch");
    }
  });
</script>

</html>
